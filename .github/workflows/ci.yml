# ═══════════════════════════════════════════════════════════════════════
# Covara One — CI/CD Pipeline (GitHub Actions)
#
# Triggers: push to main/develop, PRs to main
# Jobs:
#   1. lint-and-test  — Python syntax check + pytest + frontend build
#   2. docker-build   — Build & validate Docker images (no push)
#   3. security-scan  — Dependency audit for both Python & Node
# ═══════════════════════════════════════════════════════════════════════

name: Covara One CI/CD

on:
  push:
    branches: [main, develop, ui-overhaul]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: covara-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Job 1: Lint, Type-Check, Test ─────────────────────────────────
  lint-and-test:
    name: Release Safety Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check (all backend files)
        run: |
          python -c "
          import ast, pathlib, sys
          files = list(pathlib.Path('backend/app').rglob('*.py'))
          errors = []
          for f in files:
              try:
                  ast.parse(f.read_text('utf-8'), str(f))
              except SyntaxError as e:
                  errors.append(f'{f}: line {e.lineno} - {e.msg}')
          print(f'Checked {len(files)} files')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All files OK')
          "

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short --no-header
        env:
          APP_ENV: test
          STRICT_ENV_VALIDATION: "false"
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          DEVICE_CONTEXT_HMAC_SECRET: test-device-secret
          PAYOUT_PROVIDER_WEBHOOK_SECRET: test-payout-webhook-secret

      - name: OpenAPI contract drift check
        run: python scripts/check_openapi_drift.py

      - name: SQL migration safety check
        run: python scripts/validate_sql_migrations.py

      - name: Deployment manifest guardrail tests
        run: python -m pytest tests/test_deployment_manifests.py -q

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            mobile/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend environment validation
        working-directory: frontend
        run: npm run validate:env
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: /api

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: /api

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Mobile environment validation
        working-directory: mobile
        run: npm run validate:env
        env:
          EXPO_PUBLIC_API_BASE_URL: http://localhost:8000
          EXPO_PUBLIC_SUPABASE_URL: https://test.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: test-key
          EXPO_PUBLIC_DEVICE_CONTEXT_HMAC_SECRET: test-mobile-device-secret

      - name: Mobile type-check
        working-directory: mobile
        run: npm run typecheck

      - name: Docker Compose render check
        run: docker compose --env-file .env.example config > /tmp/covara-compose-rendered.yml

  # ── Job 2: Docker Build Validation ─────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: covara-one-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: covara-one-frontend:ci
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://test.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=test-key
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Security Audit ──────────────────────────────────────────
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies (for audit)
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Node dependency audit
        working-directory: frontend
        run: npm audit --omit=dev
