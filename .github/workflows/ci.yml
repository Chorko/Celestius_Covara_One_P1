# ═══════════════════════════════════════════════════════════════════════
# Covara One — CI/CD Pipeline (GitHub Actions)
#
# Triggers: push to all branches, PRs to main
# Jobs:
#   1. backend-validation  — Python syntax + full test suite + contract guardrails
#   2. frontend-validation — Frontend env validation + lint + type-check + build
#   3. mobile-validation   — Mobile env validation + type-check
#   4. e2e-api-flow-gate  — API flow simulation + runtime HTTP smoke
#   5. docker-build        — Build & validate Docker images (no push)
#   6. security-scan       — Dependency audits for Python + Node
# ═══════════════════════════════════════════════════════════════════════

name: Covara One CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: covara-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  # ── Job 1: Backend Validation ──────────────────────────────────────
  backend-validation:
    name: Backend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check (all backend files)
        run: |
          python -c "
          import ast, pathlib, sys
          files = list(pathlib.Path('backend/app').rglob('*.py'))
          errors = []
          for f in files:
              try:
                  ast.parse(f.read_text('utf-8'), str(f))
              except SyntaxError as e:
                  errors.append(f'{f}: line {e.lineno} - {e.msg}')
          print(f'Checked {len(files)} files')
          if errors:
              for e in errors:
                  print(f'ERROR: {e}')
              sys.exit(1)
          print('All files OK')
          "

      - name: Run pytest
        run: |
          python -m pytest tests/ -v --tb=short --no-header
        env:
          APP_ENV: test
          STRICT_ENV_VALIDATION: "false"
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          DEVICE_CONTEXT_HMAC_SECRET: test-device-secret
          PAYOUT_PROVIDER_WEBHOOK_SECRET: test-payout-webhook-secret

      - name: OpenAPI contract drift check
        run: python scripts/check_openapi_drift.py

      - name: SQL migration safety check
        run: python scripts/validate_sql_migrations.py

      - name: Deployment manifest guardrail tests
        run: python -m pytest tests/test_deployment_manifests.py -q

      - name: Docker Compose render check
        run: |
          touch .env
          docker compose --env-file .env.example config > /tmp/covara-compose-rendered.yml

  # ── Job 2: Frontend Validation ─────────────────────────────────────
  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend environment validation
        working-directory: frontend
        run: npm run validate:env
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: /api

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend type-check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          NEXT_PUBLIC_API_URL: /api

  # ── Job 3: Mobile Validation ───────────────────────────────────────
  mobile-validation:
    name: Mobile Validation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install mobile dependencies
        working-directory: mobile
        run: npm ci

      - name: Mobile environment validation
        working-directory: mobile
        run: npm run validate:env
        env:
          EXPO_PUBLIC_API_BASE_URL: http://localhost:8000
          EXPO_PUBLIC_SUPABASE_URL: https://test.supabase.co
          EXPO_PUBLIC_SUPABASE_ANON_KEY: test-key
          EXPO_PUBLIC_DEVICE_CONTEXT_HMAC_SECRET: test-mobile-device-secret

      - name: Mobile type-check
        working-directory: mobile
        run: npm run typecheck

  # ── Job 4: E2E API Flow Gate ───────────────────────────────────────
  e2e-api-flow-gate:
    name: E2E API Flow Gate
    runs-on: ubuntu-latest
    needs: [backend-validation]
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: E2E flow simulation tests
        run: |
          python -m pytest \
            tests/test_claims_review_workflow.py \
            tests/test_payout_workflow.py \
            tests/test_events_router.py \
            tests/test_ops_router.py \
            tests/test_policies_router.py \
            tests/test_auto_claim_engine.py \
            tests/test_version_governance.py \
            -v --tb=short --no-header
        env:
          APP_ENV: test
          STRICT_ENV_VALIDATION: "false"
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          DEVICE_CONTEXT_HMAC_SECRET: test-device-secret
          PAYOUT_PROVIDER_WEBHOOK_SECRET: test-payout-webhook-secret

      - name: Start backend runtime (local e2e smoke)
        run: |
          nohup uvicorn backend.app.main:app --host 127.0.0.1 --port 8000 > /tmp/covara-backend.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health > /tmp/health.json; then
              echo "Backend is up";
              exit 0;
            fi
            sleep 2
          done
          echo "Backend failed to start"
          cat /tmp/covara-backend.log || true
          exit 1
        env:
          APP_ENV: test
          STRICT_ENV_VALIDATION: "false"
          NEXT_PUBLIC_SUPABASE_URL: https://test.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_ANON_KEY: test-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-key
          DEVICE_CONTEXT_HMAC_SECRET: test-device-secret
          PAYOUT_PROVIDER_WEBHOOK_SECRET: test-payout-webhook-secret
          EVENT_BUS_BACKEND: inmemory
          EVENT_OUTBOX_RELAY_ENABLED: "true"
          EVENT_CONSUMER_ENABLED: "false"

      - name: Runtime HTTP e2e gate
        run: python scripts/ci_e2e_gate.py --base-url http://127.0.0.1:8000

      - name: Dump backend logs on failure
        if: failure()
        run: cat /tmp/covara-backend.log || true

  # ── Job 5: Docker Build Validation ─────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation, mobile-validation, e2e-api-flow-gate]
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: covara-one-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: covara-one-frontend:ci
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=https://test.supabase.co
            NEXT_PUBLIC_SUPABASE_ANON_KEY=test-key
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 6: Security Audit ──────────────────────────────────────────
  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: [backend-validation, frontend-validation]
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Python dependency audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies (for audit)
        working-directory: frontend
        run: npm ci --ignore-scripts

      - name: Node dependency audit
        working-directory: frontend
        run: npm audit --omit=dev
