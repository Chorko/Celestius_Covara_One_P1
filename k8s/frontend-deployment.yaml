apiVersion: apps/v1
kind: Deployment
metadata:
  name: covara-frontend
  labels:
    app: covara-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: covara-frontend
  template:
    metadata:
      labels:
        app: covara-frontend
    spec:
      containers:
      - name: covara-frontend
        image: covara-frontend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
        envFrom:
        - secretRef:
            name: covara-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /api/live
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
spec:
  selector:
    app: covara-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
