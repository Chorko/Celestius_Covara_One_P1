apiVersion: apps/v1
kind: Deployment
metadata:
  name: covara-backend
  labels:
    app: covara-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: covara-backend
  template:
    metadata:
      labels:
        app: covara-backend
    spec:
      containers:
      - name: covara-backend
        image: covara-backend:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: covara-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: covara-backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
