# ═══════════════════════════════════════════════════════════════════════
# Covara One — Docker Compose (Development & Production)
#
# Usage:
#   Development:  docker compose up --build
#   Production:   docker compose -f docker-compose.yml up -d
#
# Services:
#   backend   — FastAPI API server (port 8000)
#   frontend  — Next.js web app (port 3000)
#   redis     — Caching layer for API pool & session store
# ═══════════════════════════════════════════════════════════════════════

services:
  # ── Backend API ─────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: covara-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - STRICT_ENV_VALIDATION=${STRICT_ENV_VALIDATION:-true}
      - SUPABASE_URL=${SUPABASE_URL:?SUPABASE_URL is required}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY:?SUPABASE_ANON_KEY is required}
      - SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY:?SUPABASE_SERVICE_ROLE_KEY is required}
      - DEVICE_CONTEXT_HMAC_SECRET=${DEVICE_CONTEXT_HMAC_SECRET:?DEVICE_CONTEXT_HMAC_SECRET is required}
      - PAYOUT_PROVIDER_WEBHOOK_SECRET=${PAYOUT_PROVIDER_WEBHOOK_SECRET:?PAYOUT_PROVIDER_WEBHOOK_SECRET is required}
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      - REDIS_URL=redis://redis:6379
      - PAYOUT_PROVIDER=${PAYOUT_PROVIDER:-simulated_gateway}
      - PAYOUT_PROVIDER_API_BASE_URL=${PAYOUT_PROVIDER_API_BASE_URL:-}
      - PAYOUT_PROVIDER_API_KEY=${PAYOUT_PROVIDER_API_KEY:-}
      - PAYOUT_PROVIDER_TIMEOUT_SECONDS=${PAYOUT_PROVIDER_TIMEOUT_SECONDS:-10}
      - EVENT_BUS_BACKEND=${EVENT_BUS_BACKEND:-inmemory}
      - EVENT_BUS_TOPIC_PREFIX=${EVENT_BUS_TOPIC_PREFIX:-covara}
      - EVENT_BUS_PUBLISH_ON_WRITE=${EVENT_BUS_PUBLISH_ON_WRITE:-true}
      - EVENT_BUS_INLINE_CONSUMER_ENABLED=${EVENT_BUS_INLINE_CONSUMER_ENABLED:-true}
      - EVENT_OUTBOX_RELAY_BATCH_SIZE=${EVENT_OUTBOX_RELAY_BATCH_SIZE:-100}
      - EVENT_OUTBOX_RELAY_ENABLED=${EVENT_OUTBOX_RELAY_ENABLED:-true}
      - EVENT_OUTBOX_RELAY_INTERVAL_SECONDS=${EVENT_OUTBOX_RELAY_INTERVAL_SECONDS:-15}
      - EVENT_OUTBOX_MAX_RETRIES=${EVENT_OUTBOX_MAX_RETRIES:-10}
      - EVENT_CONSUMER_ENABLED=${EVENT_CONSUMER_ENABLED:-true}
      - EVENT_CONSUMER_GROUP_ID=${EVENT_CONSUMER_GROUP_ID:-covara-event-consumers}
      - EVENT_CONSUMER_AUTO_OFFSET_RESET=${EVENT_CONSUMER_AUTO_OFFSET_RESET:-latest}
      - EVENT_CONSUMER_POLL_TIMEOUT_MS=${EVENT_CONSUMER_POLL_TIMEOUT_MS:-1000}
      - EVENT_CONSUMER_MAX_RECORDS=${EVENT_CONSUMER_MAX_RECORDS:-100}
      - EVENT_CONSUMER_MAX_ATTEMPTS=${EVENT_CONSUMER_MAX_ATTEMPTS:-5}
      - KAFKA_BOOTSTRAP_SERVERS=${KAFKA_BOOTSTRAP_SERVERS:-}
      - KAFKA_CLIENT_ID=${KAFKA_CLIENT_ID:-covara-backend}
      - KAFKA_SECURITY_PROTOCOL=${KAFKA_SECURITY_PROTOCOL:-PLAINTEXT}
    depends_on:
      redis:
        condition: service_healthy
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ready', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - covara-net

  # ── Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:?NEXT_PUBLIC_SUPABASE_URL is required}
        - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:?NEXT_PUBLIC_SUPABASE_ANON_KEY is required}
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    container_name: covara-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL:?NEXT_PUBLIC_SUPABASE_URL is required}
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY:?NEXT_PUBLIC_SUPABASE_ANON_KEY is required}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://backend:8000}
    depends_on:
      backend:
        condition: service_healthy
    init: true
    restart: unless-stopped
    stop_grace_period: 20s
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - covara-net

  # ── Redis (Caching) ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: covara-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - covara-net

# ── Volumes ───────────────────────────────────────────────────────────
volumes:
  redis-data:
    driver: local

# ── Networks ──────────────────────────────────────────────────────────
networks:
  covara-net:
    driver: bridge
